<body>
    <b><mark><a href="https://kbbi.web.id/kode" target="_blank">kode</a></mark></b><span>/ko·de/</span>
    
    <!-- attribute ol 'reversed' digunakan untuk membalikan urutan -->
     <!-- attribute ol 'type' digunakan untuk mengubah tipe penomoran list. tersedia bentuk alfabet (a, A), romawi (i, I), dan default bentuk angka (1) -->
    <ol reversed type="i">
        <li>tanda (kata-kata, tulisan) yang disepakati untuk maksud tertentu (untuk menjamin kerahasiaan berita, pemerintah, dan sebagainya);</li>
        <li>kumpulan peraturan yang bersistem;</li>
        <li>kumpulan prinsip yang bersistem;</li>
    </ol>
